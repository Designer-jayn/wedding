<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모바일 청첩장 - 준비 중</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f3ef;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        .header {
            padding: 40px 30px 30px;
            text-align: center;
            background: #fafaf8;
        }

        .date {
            font-size: 32px;
            font-weight: 600;
            color: #2c2c2c;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .day-name {
            font-size: 12px;
            color: #999;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .image-section {
            width: 100%;
            height: 400px;
            overflow: hidden;
            background: #e0dcd6;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .footer {
            padding: 40px 30px;
            text-align: center;
            background: #fafaf8;
        }

        .names {
            font-size: 20px;
            color: #2c2c2c;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .info {
            font-size: 13px;
            color: #999;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            background: #d4a574;
            color: #fff;
            border-radius: 20px;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 상단: 날짜 -->
        <div class="header">
            <div class="date">26 | 07 | 11</div>
            <div class="day-name">Saturday</div>
        </div>

        <!-- 중앙: 사진 -->
        <div class="image-section">
            <img src="img/img01.png" alt="청첩장">
        </div>

        <!-- 하단: 정보 -->
        <div class="footer">
            <div class="names">이성진 💕 이현주</div>
            <div class="info">
                2026년 7월 11일 (토) 오후 12시 30분<br>
                양재 라시따시어터 1층
            </div>
            <div class="status">준비 중</div>
        </div>
    </div>
</body>
</html>
