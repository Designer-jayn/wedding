<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모바일 청첩장 - 준비 중</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f3ef 0%, #ede9e3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 420px;
            background: #fff;
            padding: 60px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        .icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 28px;
            color: #2c2c2c;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 16px;
            color: #999;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .date-info {
            background: #f9f7f4;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .date-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .date-value {
            font-size: 24px;
            color: #d4a574;
            font-weight: 600;
        }

        .loading {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 40px 0 30px 0;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d4a574;
            animation: pulse 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .message {
            font-size: 13px;
            color: #bbb;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">💌</div>

        <h1>모바일 청첩장</h1>
        <p class="subtitle">
            특별한 날의 초대장을<br>
            준비하고 있습니다
        </p>

        <div class="date-info">
            <div class="date-label">예정일</div>
            <div class="date-value">2026.07.11</div>
        </div>

        <div class="loading">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <p class="message">
            곧 여러분을 초대하는 특별한 순간을 공유하겠습니다 💕
        </p>
    </div>
</body>
</html>
